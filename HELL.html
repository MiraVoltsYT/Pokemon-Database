<!DOCTYPE html>
<html>
<head>
<title>P̷o̷k̷e̷m̷o̷n̷ ̷H̷e̷l̷l̷</title>

<style>
body {
  margin:0;
  font-family: 'Courier New', monospace;
  background: linear-gradient(rgba(30, 0, 0, 0.95), rgba(0, 0, 0, 1)), url('pokemon-wallpaper.jpg');
  background-size: cover;
  background-attachment: fixed;
  color:#ff0000;
  overflow-x: hidden;
  transition: background 6s ease;
}

/* Floating/Drifting motion for boxes */
@keyframes drift {
  0% { transform: translate(0, 0) rotate(var(--rot)); }
  50% { transform: translate(8px, -8px) rotate(var(--rot)); }
  100% { transform: translate(-8px, 8px) rotate(var(--rot)); }
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 25px;
  background:rgba(10,0,0,0.95);
  border-bottom:3px solid #ff0000;
  filter: grayscale(1) invert(1);
}

.container { padding:30px; }

.title {
  font-size:35px;
  margin-bottom:30px;
  text-align:center;
  color:#ff0000;
  text-shadow: 0 0 15px #ff0000;
}

.gen-list {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:40px;
  justify-items:center;
}

.generation {
  padding:25px 15px;
  width:180px;
  background:rgba(15, 0, 0, 0.95);
  border-left:8px solid #600;
  cursor:pointer;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  color: #900;
  animation: drift 5s infinite ease-in-out alternate;
}

/* Individual Rotations */
.gen1 { --rot: -3deg; } .gen2 { --rot: 2deg; } .gen3 { --rot: -6deg; } .gen4 { --rot: 4deg; }
.gen5 { --rot: -2deg; } .gen6 { --rot: 5deg; } .gen7 { --rot: -8deg; } .gen8 { --rot: 3deg; }
.gen9 { --rot: -5deg; } .gen10 { --rot: 10deg; } .gen11 { --rot: -9deg; } .gen12 { --rot: 4deg; }
.type-chart { --rot: -12deg; border-left-color: #f00; color: #f00; }
.battle-sim { --rot: 8deg; border-left-color: #f00; color: #f00; }

.generation:hover {
  background: #ff0000 !important;
  color: #000 !important;
  box-shadow: 0 0 40px #ff0000;
  animation-play-state: paused;
}

.restore-box {
    margin: 60px auto;
    width: 220px;
    padding: 15px;
    border: 2px solid #ff0000;
    text-align: center;
    cursor: pointer;
    background: black;
    color: #ff0000;
    font-weight: bold;
    transition: 0.4s;
}

/* REBOOT SCREEN OVERLAY */
#reboot-overlay {
    position: fixed;
    top:0; left:0; width: 100%; height: 100%;
    display: none;
    z-index: 10000;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #1a0000;
    transition: background 10s linear;
}

#progress-container {
    width: 400px;
    height: 25px;
    background: #000;
    border: 2px solid #555;
    margin-bottom: 20px;
    position: relative;
    overflow: visible; /* To allow the -1% glitch to break out */
}

#progress-bar {
    width: 0%;
    height: 100%;
    background: #a855f7;
    box-shadow: 0 0 15px #a855f7;
    transition: width 0.4s ease;
}

#percentage-text { color: white; margin-bottom: 5px; font-weight: bold; }
#status-text { color: #fff; font-size: 16px; font-style: italic; opacity: 0.7; }

/* THE FINAL SCREEN */
#final-screen {
    position: fixed;
    top:0; left:0; width: 100%; height: 100%;
    background: white;
    display: none;
    z-index: 10001;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 2s ease;
}

.welcome-text { font-size: 42px; color: #7C3AED; font-family: 'Arial', sans-serif; }

</style>
</head>

<body>

<div class="header">
  <img src="pokedex.png" style="height:55px;">
  <img src="pokemon.png" style="height:55px;">
</div>

<div class="container" id="main-content">
  <div class="title">FATAL_SYSTEM_ERROR</div>

  <div class="gen-list">
    <div class="generation gen1" data-text="Generation 1" onclick="location.href='gen1HELL.html'">Generation 1</div>
    <div class="generation gen2" data-text="Generation 2" onclick="location.href='gen2HELL.html'">Generation 2</div>
    <div class="generation gen3" data-text="Generation 3" onclick="location.href='gen3HELL.html'">Generation 3</div>
    <div class="generation gen4" data-text="Generation 4" onclick="location.href='gen4HELL.html'">Generation 4</div>
    <div class="generation gen5" data-text="Generation 5" onclick="location.href='gen5HELL.html'">Generation 5</div>
    <div class="generation gen6" data-text="Generation 6" onclick="location.href='gen6HELL.html'">Generation 6</div>
    <div class="generation gen7" data-text="Generation 7" onclick="location.href='gen7HELL.html'">Generation 7</div>
    <div class="generation gen8" data-text="Generation 8" onclick="location.href='gen8HELL.html'">Generation 8</div>
    <div class="generation gen9" data-text="Generation 9" onclick="location.href='gen9HELL.html'">Generation 9</div>
    <div class="generation gen10" data-text="Generation 10" onclick="location.href='gen10HELL.html'">Generation 10</div>
    <div class="generation gen11" data-text="Generation 11" onclick="location.href='gen11HELL.html'">Generation 11</div>
    <div class="generation gen12" data-text="Generation 12" onclick="location.href='gen12HELL.html'">Generation 12</div>
    <div class="generation type-chart" data-text="Type Chart" onclick="location.href='type-chartHELL.html'">Type Chart</div>
    <div class="generation battle-sim" data-text="Battle Engine" onclick="location.href='battle-simHELL.html'">Battle Engine</div>
  </div>

  <div class="restore-box" onclick="startRestore()">Restore?</div>
</div>

<div id="reboot-overlay">
    <div id="percentage-text">0%</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="status-text">Scanning for errors...</div>
</div>

<div id="final-screen">
    <div class="welcome-text">Welcome Back [Trainer]! :D</div>
</div>

<script>
async function wait(ms) { return new Promise(res => setTimeout(res, ms)); }

async function startRestore() {
    const overlay = document.getElementById('reboot-overlay');
    const bar = document.getElementById('progress-bar');
    const status = document.getElementById('status-text');
    const percent = document.getElementById('percentage-text');
    const final = document.getElementById('final-screen');

    overlay.style.display = 'flex';
    setTimeout(() => { overlay.style.background = "#e0f7fa"; }, 500);

    // Realistic Loading Sequence
    async function update(val, msg, speed = 400) {
        bar.style.width = val + "%";
        percent.innerText = val + "%";
        if(msg) status.innerText = msg;
        await wait(speed);
    }

    await update(10, "Destroying Bugs...");
    await wait(1000);
    await update(35, "Solving Problems....");
    await wait(5000); // Stop for 5 seconds
    await update(60, "Finding glitches...");
    await update(85, "Rebooting AI...", 200);
    await wait(2000);

    // THE GLITCH
    status.innerText = "CRITICAL FAILURE";
    bar.style.width = "-50px"; // Bar breaks out to the left
    percent.innerText = "-1%";
    overlay.style.filter = "invert(1)";
    await wait(1000);
    overlay.style.filter = "none";
    
    // BACK TO NORMAL
    await update(99, "Reconstructing system...");
    await wait(10000); // Stop at 99% for 10 seconds
    
    percent.innerText = "99.99%";
    await wait(2000);
    
    await update(100, "Done!", 100);

    // Final Fade and Redirect
    setTimeout(() => {
        final.style.display = 'flex';
        setTimeout(() => final.style.opacity = "1", 50);
        
        // Redirect to index after 4 seconds of showing the welcome screen
        setTimeout(() => {
            location.href = 'index.html';
        }, 4000);
    }, 1000);
}
</script>

</body>
</html>
