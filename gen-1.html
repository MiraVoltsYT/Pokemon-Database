<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID_DIRECTORY_[-1]</title>
    <style>
        :root {
            --glitch-red: #ff0000;
            --dark-red: #350000;
            --void-bg: #000000;
        }

        body {
            background-color: var(--void-bg);
            color: #8b0000;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(139, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transition: background-color 2s;
        }

        #creepy-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
            font-size: 5vw;
            color: rgba(255, 0, 0, 0); 
            text-align: center;
            white-space: pre-wrap;
            animation: twitch 0.05s infinite;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        @keyframes twitch {
            0% { transform: translate(-52%, -48%); }
            25% { transform: translate(-49%, -51%); }
            50% { transform: translate(-51%, -49%); }
            75% { transform: translate(-48%, -52%); }
            100% { transform: translate(-50%, -50%); }
        }

        .header {
            position: sticky; top: 0; z-index: 50;
            background: #000; border-bottom: 2px solid #5a0000;
            padding: 15px; text-align: center;
        }

        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px; padding: 25px;
        }

        .glitch-card {
            background: #050000;
            border: 1px solid var(--dark-red);
            padding: 12px;
            text-decoration: none;
            color: #8b0000;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.1s;
        }

        .glitch-card:hover {
            border-color: #ff0000;
            background: #1a0000;
            color: #ff0000;
        }

        .sprite-box {
            width: 60px; height: 60px;
            background: #000; border: 1px solid #4a0000;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin-bottom: 8px;
        }

        .nav-back {
            color: #5a0000; text-decoration: none; font-size: 11px;
            border: 1px solid #5a0000; padding: 5px 12px;
            cursor: pointer;
        }

        .terminate-container {
            text-align: center;
            padding: 100px 0;
            background: linear-gradient(transparent, #1a0000);
        }

        .terminate-btn {
            display: inline-block;
            color: #ff0000;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            padding: 15px 40px;
            border: 3px solid #ff0000;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: all 0.1s;
            cursor: pointer;
            box-shadow: 0 0 15px #8b0000;
        }
    </style>
</head>
<body>

<div id="creepy-overlay">RUN</div>

<div class="header">
    <h2 style="margin:0; font-size: 18px; color: #4a0000;">[ SECTOR_-1_ILLEGAL_ACCESS ]</h2>
    <h3 id="status-text" style="margin:0; font-size: 14px; color: #4a0000;">There's easter eggs!</h3>
    <a href="javascript:void(0)" id="topExitBtn" onclick="handleExitAttempt(this)" class="nav-back">EXIT??</a>
</div>

<div class="pokedex-grid" id="voidGrid"></div>

<div class="terminate-container">
    <a href="javascript:void(0)" id="termBtn" onclick="handleTerminate(this)" class="terminate-btn">тєямιηαтє ƒιℓє</a>
</div>

<script>
// --- CORE STATE ---
let totalTerminations = parseInt(localStorage.getItem('termCount')) || 0;
let lockStatus = localStorage.getItem('voidLocked') || 'false'; // 'false', 'true', or 'permanent'
let stillTimer;
let isWaiting = false;

// --- WHISPER LOGIC ---
const whispers = ["I see you, {TRAINER}", "Still here?", "Don't leave me...", "It's cold out there", "Why are you here?"];
if (lockStatus === 'permanent') {
    setInterval(() => {
        const statusText = document.getElementById('status-text');
        statusText.innerHTML = whispers[Math.floor(Math.random() * whispers.length)];
        statusText.style.color = "red";
    }, 8000);
}

// --- TERMINATE LOGIC ---
function handleTerminate(el) {
    if (lockStatus === 'permanent') {
        alert("Oh oh oh.. going so soon?");
        startStillnessChallenge();
        return;
    }

    if (lockStatus === 'true') {
        alert("Your exit is hidden within the infinite of space, but if doubles and stood upright");
        return;
    }

    totalTerminations++;
    localStorage.setItem('termCount', totalTerminations.toString());

    if (totalTerminations === 5) {
        alert("You really think i would forget?");
        window.location.href = "index.html";
    } else if (totalTerminations === 7) {
        alert("Stop... i know what your trying to do, and i won't let you");
        window.location.href = "index.html";
    } else if (totalTerminations >= 10) {
        localStorage.setItem('voidLocked', 'true');
        location.reload();
    } else {
        window.location.href = "index.html";
    }
}

// --- STILLNESS CHALLENGE ---
function startStillnessChallenge() {
    document.getElementById('status-text').innerHTML = "DON'T MOVE.";
    document.getElementById('status-text').style.fontSize = "24px";
    
    let secondsStill = 0;
    const challenge = setInterval(() => {
        secondsStill++;
        if (secondsStill >= 10) {
            clearInterval(challenge);
            alert("PROTOCOL_BROKEN: FAKE_EXIT_INITIATED");
            window.location.href = "fakeIndex.html";
        }
    }, 1000);

    // If mouse moves, reset the challenge
    window.onmousemove = () => {
        if (secondsStill > 0 && secondsStill < 10) {
            secondsStill = 0;
            console.log("Stillness broken.");
        }
    };
}

// --- TOP BUTTON (EXIT) ---
function handleExitAttempt(el) {
    if (isWaiting || lockStatus !== 'false') return;
    isWaiting = true;
    el.innerHTML = "ACCESS_DENIED";
    setTimeout(() => {
        el.innerHTML = "EXIT??";
        isWaiting = false;
    }, 1000);
}

// --- GRID GENERATION ---
const grid = document.getElementById('voidGrid');
const symbols = ["?", "Ø", "†", "Σ", "X", "░", "▓", "NaN", "𒀱", "𒄆"];

for (let i = 1; i <= 200; i++) {
    const id = i.toString().padStart(4, '0');
    const card = document.createElement('a');
    card.className = 'glitch-card';
    
    if (id === "0088") {
        card.href = "javascript:void(0)";
        card.onclick = () => {
            if (lockStatus === 'true') {
                alert("PROTOCOL_DECRYPTED: EXIT_GRANTED");
                setTimeout(() => {
                    alert("You Idiot... you really thought it would be that easy?");
                    localStorage.setItem('voidLocked', 'permanent');
                    location.reload();
                }, 500);
            }
        };
    } else {
        card.href = `-${id}.html`;
    }

    const symbol = (lockStatus === 'permanent') ? "X" : symbols[Math.floor(Math.random() * symbols.length)];
    card.innerHTML = `<div class="sprite-box">${symbol}</div><div class="id-num"># -${id}</div><div class="name-err">VOID_ENTRY</div>`;
    grid.appendChild(card);
}

// --- APPLY LOCKDOWN UI ---
if (lockStatus === 'true' || lockStatus === 'permanent') {
    document.getElementById('status-text').innerHTML = "YOU ARE NOT LEAVING.";
    document.getElementById('topExitBtn').style.display = 'none';
    if (lockStatus === 'permanent') {
        document.body.style.backgroundColor = "#1a0000";
        document.getElementById('termBtn').innerHTML = "STAY.";
    }
}

// --- OVERLAY SCROLL LOGIC ---
const overlay = document.getElementById('creepy-overlay');
const horrorPhrases = ["H̸I̸D̸E̸", "N̾O̾ ̾E̾S̾C̾A̾P̾E̾", "尺ㄩ几", "𝒩𝒪 𝒯𝒰ℛ𝒩ℐ𝒩𝒢 ℬ𝒜𝒞𝒦"];
setInterval(() => {
    let scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight || 1);
    if (scrollPercent > 0.05) {
        overlay.innerHTML = horrorPhrases[Math.floor(Math.random() * horrorPhrases.length)];
        overlay.style.color = `rgba(255, 0, 0, ${scrollPercent})`;
    }
}, 250);
</script>
</body>
</html>
